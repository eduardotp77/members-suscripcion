# ══════════════════════════════════════════════════════════════
# Stack para Portainer — SociosMembres (React SPA + Supabase)
# Compatible con Setup Orion (Traefik + Docker Swarm)
# ══════════════════════════════════════════════════════════════
#
# INSTRUCCIONES:
# 1. Hacer "bun build" o "npm run build" en tu máquina local
# 2. Abrir Termius SFTP (root) → crear carpeta /root/socios-members/
# 3. Subir TODO el contenido de dist/ dentro de /root/socios-members/
# 4. Subir nginx.conf al servidor en /root/socios-members/nginx.conf
# 5. Crear este stack en Portainer
#
# CAMBIAR ANTES DE DESPLEGAR:
# - members.sudominioaqui.com → tu dominio/subdominio real
# - Su_Red_Interna → nombre de tu red interna (la que usa Traefik)
# - America/Sao_Paulo → tu zona horaria
#

version: "3.7"

services:

## ----------------------- SOCIOSFLIXCOM ----------------------- ##

  socios-members:
    image: nginx:alpine

    volumes:
      - /root/socios-members:/usr/share/nginx/html:ro
      - /root/socios-members/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - Su_Red_Interna

    environment:
      - TZ=America/Sao_Paulo

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.http.routers.socios.rule=Host(`members.sudominioaqui.com`) || Host(`www.members.sudominioaqui.com`)
        - traefik.http.services.socios.loadbalancer.server.port=80
        - traefik.http.routers.socios.service=socios
        - traefik.http.routers.socios.tls.certresolver=letsencryptresolver
        - traefik.http.routers.socios.entrypoints=websecure
        - traefik.http.routers.socios.tls=true
        # Redirección HTTP → HTTPS
        - traefik.http.middlewares.socios-https.redirectscheme.scheme=https
        - traefik.http.routers.socios-http.rule=Host(`members.sudominioaqui.com`) || Host(`www.members.sudominioaqui.com`)
        - traefik.http.routers.socios-http.entrypoints=web
        - traefik.http.routers.socios-http.middlewares=socios-https

## ----------------------- SOCIOS MEMBERS ----------------------- ##

networks:
  Su_Red_Interna:
    name: Su_Red_Interna
    external: true
