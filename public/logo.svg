<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo exterior (renovación/ciclo) -->
  <circle cx="100" cy="100" r="85" stroke="url(#logoGradient)" stroke-width="8" fill="none" opacity="0.3"/>
  
  <!-- "S" estilizada principal -->
  <path d="M 120 50 
           Q 150 50, 150 75
           Q 150 95, 130 100
           Q 110 105, 110 115
           L 90 115
           Q 90 95, 110 90
           Q 130 85, 130 75
           Q 130 60, 115 60
           L 70 60
           Q 50 60, 50 80
           L 35 80
           Q 35 45, 70 45
           Z" 
        fill="url(#logoGradient)"/>
  
  <path d="M 80 150
           Q 50 150, 50 125
           Q 50 105, 70 100
           Q 90 95, 90 85
           L 110 85
           Q 110 105, 90 110
           Q 70 115, 70 125
           Q 70 140, 85 140
           L 130 140
           Q 150 140, 150 120
           L 165 120
           Q 165 155, 130 155
           Z"
        fill="url(#logoGradient)"/>
  
  <!-- Puntos de conexión (representan miembros/clientes) -->
  <circle cx="100" cy="35" r="6" fill="url(#logoGradient)"/>
  <circle cx="165" cy="100" r="6" fill="url(#logoGradient)"/>
  <circle cx="100" cy="165" r="6" fill="url(#logoGradient)"/>
  <circle cx="35" cy="100" r="6" fill="url(#logoGradient)"/>
</svg>
